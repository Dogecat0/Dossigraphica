use_default_settings: true
server:
  limiter: false
  secret_key: "somesecretkey"
  image_proxy: true
search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en-US"
  formats:
    - html
    - json
engines:
  - name: google
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: bing
    engine: bing
    shortcut: b
    weight: 1.0
    timeout: 3.0
  - name: brave
    engine: brave
    shortcut: br
    weight: 1.0
    timeout: 3.0
  - name: qwant
    engine: qwant
    shortcut: qw
    weight: 0.8
    timeout: 3.0
  - name: mojeek
    engine: mojeek
    shortcut: mj
    weight: 0.8
    timeout: 3.0
  - name: yahoo
    engine: yahoo
    shortcut: y
    weight: 0.5
    timeout: 3.0
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
